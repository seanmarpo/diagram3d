<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <!-- background tile -->
  <rect x="0" y="0" width="36" height="36" rx="7" fill="#0f172a" />

  <!-- spine: TL → BL -->
  <line
        x1="9"
        y1="7"
        x2="9"
        y2="29"
        stroke="#38bdf8"
        stroke-width="2"
        stroke-linecap="round"
    />

  <!-- top bar: TL → TR -->
  <line
        x1="9"
        y1="7"
        x2="16"
        y2="7"
        stroke="#38bdf8"
        stroke-width="2"
        stroke-linecap="round"
    />

  <!-- bottom bar: BL → BR -->
  <line
        x1="9"
        y1="29"
        x2="16"
        y2="29"
        stroke="#38bdf8"
        stroke-width="2"
        stroke-linecap="round"
    />

  <!-- curve top: TR → MR (dashed) -->
  <line
        x1="16"
        y1="7"
        x2="27"
        y2="18"
        stroke="#818cf8"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-dasharray="2.5 2.5"
    />

  <!-- curve bot: MR → BR (dashed) -->
  <line
        x1="27"
        y1="18"
        x2="16"
        y2="29"
        stroke="#818cf8"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-dasharray="2.5 2.5"
    />

  <!-- nodes -->
  <circle cx="9" cy="7" r="2.2" fill="#38bdf8" />
  <circle cx="9" cy="29" r="2.2" fill="#38bdf8" />
  <circle cx="16" cy="7" r="2" fill="#818cf8" />
  <circle cx="27" cy="18" r="2.4" fill="#38bdf8" />
  <circle cx="16" cy="29" r="2" fill="#818cf8" />
</svg>
